<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- ring -->
  <circle cx="50" cy="50" r="38" stroke="#f59e0b" stroke-width="6" fill="none"/>

  <!-- vertical lines -->
  <line x1="50" y1="0" x2="50" y2="38" stroke="#f59e0b" stroke-width="6"/>
  <line x1="50" y1="62" x2="50" y2="100" stroke="#f59e0b" stroke-width="6"/>

  <!-- horizontal lines -->
  <line x1="0" y1="50" x2="38" y2="50" stroke="#f59e0b" stroke-width="6"/>
  <line x1="62" y1="50" x2="100" y2="50" stroke="#f59e0b" stroke-width="6"/>

  <!-- center dot -->
  <circle cx="50" cy="50" r="6" fill="#f59e0b"/>
</svg>