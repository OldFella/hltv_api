<a href="/" class="home-logo">
  <div class="logo-crosshair">
    <div class="logo-crosshair-ring"></div>
    <div class="logo-crosshair-dot"></div>
  </div>
  <span class="logo-text"><span class="logo-bracket">[</span>CS<span class="logo-hi">API</span><span class="logo-bracket">]</span></span>
</a>

<nav class="header-nav">
  {% for link in nav.links %}
    <a href="{{ link.href }}"
       class="nav-link{% if current_page == link.page_key %} active{% endif %}">
      {{ link.label }}
    </a>
  {% endfor %}
</nav>

<div class="header-actions">
  <button id="theme-toggle" title="Switch theme">&#127912; DEFAULT</button>
  <a class="button button-outline" href="{{ nav.header.api_docs_href }}" target="_blank">
    {{ nav.header.api_docs_label }}
  </a>
  <button class="burger" id="burgerBtn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="logo-text"><span class="logo-bracket">[</span>CS<span class="logo-hi">API</span><span class="logo-bracket">]</span></span>
    <button class="sidebar-close" id="sidebarClose">✕</button>
  </div>
  <nav class="sidebar-nav">
    {% for link in nav.links %}
      <a href="{{ link.href }}"
         class="sidebar-link{% if current_page == link.page_key %} active{% endif %}">
        {{ link.label }}
      </a>
    {% endfor %}
  </nav>
  <div class="sidebar-footer">
    <a class="button button-outline" href="{{ nav.header.api_docs_href }}" target="_blank">
      {{ nav.header.api_docs_label }}
    </a>
  </div>
</div>
